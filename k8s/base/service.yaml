# ── Auth Service ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: jwt-auth-service
  labels:
    app: jwt-auth-service
spec:
  selector:
    app: jwt-auth-service
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 4000
      protocol: TCP
---
# ── MongoDB Service ───────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: mongo-service
  labels:
    app: mongo
spec:
  selector:
    app: mongo
  type: ClusterIP
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
      protocol: TCP
